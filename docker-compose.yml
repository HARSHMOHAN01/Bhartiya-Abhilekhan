version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: abhilekhan_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: abhilekhan_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d abhilekhan_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: abhilekhan_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@db:5432/abhilekhan_db
      - JWT_SECRET=super_secret_jwt_key_bhartiya_abhilekhan_2026
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: abhilekhan_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
