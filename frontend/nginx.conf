server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend container in Docker environment if needed.
    # However, Vite VITE_API_BASE_URL points directly to host:8000.
    # We can add a fallback location or just rely on direct client connection.
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
